patch:
  
  style:
    # 选择皮肤
    color_scheme: macos_dark

    font_face: LXGW WenKai GB
    font_point: 28
    horizontal: true
    fullscreen: false
    inline_preedit: true
    preedit_type: composition
    display_tray_icon: false
    label_format: "%s."
    layout:
      min_width: 160
      min_height: 0
      border_width: 0
      margin_x: 1
      margin_y: 1
      spacing: 0
      candidate_spacing: 1
      hilite_spacing: 4
      hilite_padding: 2
      round_corner: 4

  # 皮肤列表
  preset_color_schemes:
    macos_dark:
      author: "一方<liuour@gmail.com>"
      back_color: 0x000000                      # 候选条背景色，24位色值，16进制，BGR顺序
      border_color: 0x000000                    # 边框色
      text_color: 0xffffff                      # 拼音行文字颜色
      hilited_back_color: 0x009bff              # 第一候选项背景背景色
      hilited_candidate_text_color: 0x000000    # 第一候选项文字颜色
      hilited_candidate_label_color: 0x000000   # 第一候选项编号颜色
      hilited_comment_text_color: 0x000000      # 注解文字高亮
      hilited_text_color: 0x000000              # 高亮拼音 (需要开启内嵌编码)
      candidate_text_color: 0xffffff            # 预选项文字颜色
      comment_text_color: 0x999999              # 拼音等提示文字颜色
      label_color: 0xffffff                     # 预选栏编号颜色
      candidate_format: "%c\u2005%@"            # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间
      font_face: "LXGW WenKai GB"                   # 候选词编号字体
      font_point: 20              # 候选文字大小
      label_font_point: 13        # 候选编号大小
      corner_radius: 25            # 候选条圆角
      hilited_corner_radius: 20    # 高亮圆角
      border_height: 4            # 窗口上下高度
      border_width: 4             # 窗口左右宽度
      border_color_width: 0       # 输入条边框宽度
