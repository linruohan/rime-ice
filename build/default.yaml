__build_info:
  rime_version: 1.13.1
  timestamps:
    default: 1770611879
    default.custom: 1715948642
ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Caps_Lock: commit_text
    Control_L: noop
    Control_R: noop
    Eisu_toggle: clear
    Shift_L: commit_code
    Shift_R: noop
config_version: "2026-02-06"
key_binder:
  bindings:
    - {accept: "Control+Shift+4", toggle: traditionalization, when: always}
    - {accept: "Control+Shift+F", toggle: traditionalization, when: always}
    - {accept: "Control+Shift+slash", toggle: traditionalization, when: always}
    - {accept: "Control+Shift+A", toggle: ascii_punct, when: always}
    - {accept: "Control+a", send: Home, when: composing}
    - {accept: "Control+e", send: End, when: composing}
    - {accept: ISO_Left_Tab, send: "Shift+Left", when: composing}
    - {accept: "Shift+Tab", send: "Shift+Left", when: composing}
    - {accept: Tab, send: "Shift+Right", when: composing}
    - {accept: minus, send: Page_Up, when: has_menu}
    - {accept: equal, send: Page_Down, when: has_menu}
  select_first_character: bracketleft
  select_last_character: grave
menu:
  page_size: 4
navigator:
  bindings:
    Left: left_by_char_no_loop
    Right: right_by_char_no_loop
    "Shift+Left": left_by_syllable
    "Shift+Right": right_by_syllable
punctuator:
  digit_separators: ",.:"
  full_shape:
    " ": {commit: "　"}
    "!": {commit: "！"}
    "\"": {pair: ["“", "”"]}
    "#": ["＃", "⌘"]
    "$": ["￥", "$", "€", "£", "¥", "¢", "¤"]
    "%": ["％", "°", "℃"]
    "&": "＆"
    "'": {pair: ["‘", "’"]}
    "(": "（"
    ")": "）"
    "*": ["＊", "·", "・", "×", "※", "❂"]
    "+": "＋"
    ",": {commit: "，"}
    "-": "－"
    .: {commit: "。"}
    "/": ["／", "÷"]
    ":": {commit: "："}
    ";": {commit: "；"}
    "<": ["《", "〈", "«", "‹"]
    "=": "＝"
    ">": ["》", "〉", "»", "›"]
    "?": {commit: "？"}
    "@": ["＠", "☯"]
    "[": ["「", "【", "〔", "［"]
    "\\": ["、", "＼"]
    "]": ["」", "】", "〕", "］"]
    "^": {commit: "……"}
    _: "——"
    "`": "｀"
    "{": ["『", "〖", "｛"]
    "|": ["·", "｜", "§", "¦"]
    "}": ["』", "〗", "｝"]
    "~": "～"
  half_shape:
    "!": "！"
    "\"": {pair: ["“", "”"]}
    "#": "#"
    "$": "¥"
    "%": "%"
    "&": "&"
    "'": {pair: ["‘", "’"]}
    "(": "（"
    ")": "）"
    "*": "*"
    "+": "+"
    ",": "，"
    "-": "-"
    .: "。"
    "/": "/"
    ":": "："
    ";": "；"
    "<": "《"
    "=": "="
    ">": "》"
    "?": "？"
    "@": "@"
    "[": "【"
    "\\": "、"
    "]": "】"
    "^": "……"
    _: "——"
    "`": "·"
    "{": "「"
    "|": "|"
    "}": "」"
    "~": "~"
recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    underscore: "^[A-Za-z]+_.*"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
schema_list:
  - schema: rime_ice
  - schema: luna_pinyin
  - schema: luna_pinyin_fluency
  - schema: luna_pinyin_simp
  - schema: luna_quanpin
  - schema: double_pinyin_flypy
switcher:
  abbreviate_options: true
  caption: "「方案选单」"
  fold_options: false
  hotkeys:
    - "Control+Shift+grave"
  option_list_separator: " / "
  save_options:
    - full_shape
    - ascii_punct
    - traditionalization
    - emoji